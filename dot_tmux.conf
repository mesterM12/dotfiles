##### PREFIX ############################################################

unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### GENERAL ###########################################################

set -g mouse on
set -g history-limit 100000
set -sg escape-time 10

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

setw -g mode-keys vi

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### GHOSTTY / TERMINAL ################################################

# Let tmux understand that the outer terminal supports RGB/truecolor.
# This is the modern tmux approach for tmux 3.2+.
set -as terminal-features ",xterm-ghostty:RGB"

# Pass through some escape sequences more cleanly in newer tmux versions.
set -g allow-passthrough on

##### PANES / WINDOWS ###################################################

# Open new panes/windows in the current directory.
unbind '"'
unbind %

bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane movement.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Easy pane resizing.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation.
bind-key Tab last-window
bind n next-window
bind p previous-window

##### COPY MODE #########################################################

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

##### TPM + PLUGINS #####################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.2'

##### CATPPUCCIN ########################################################

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'default'

# Keep the status line clean and not too busy.
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_left_separator ''
set -g @catppuccin_window_right_separator ''

# Simple modules.
set -g @catppuccin_status_modules_right 'session application date_time'
set -g @catppuccin_date_time_text '%Y-%m-%d %H:%M'

# Optional labels for modules.
set -g @catppuccin_session_text ' #S '
set -g @catppuccin_application_text ' #{pane_current_command} '

# Theme must be loaded before status-left/right if you want to use theme vars/modules.
run '~/.tmux/plugins/tpm/tpm'
